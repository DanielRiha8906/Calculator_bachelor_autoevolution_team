name: Claude Implement Issue (shared)

on:
  workflow_call:
    inputs:
      branch:
        description: 'Experiment branch to check out and target (e.g. exp/naive-generic)'
        type: string
        required: true
      experiment_name:
        description: 'Human-readable experiment name used in the prompt (e.g. naive-generic)'
        type: string
        required: true
      issue_number:
        description: 'Issue number to implement'
        type: string
        required: true
      issue_title:
        description: 'Issue title'
        type: string
        required: true
      issue_body:
        description: 'Issue body / description'
        type: string
        required: false
        default: ''
      prompt_additions:
        description: 'Experiment-specific prompt additions appended after the shared instructions'
        type: string
        required: false
        default: ''
    secrets:
      anthropic_api_key:
        required: true

jobs:
  claude-implement:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Run Claude Code Action
        id: run-claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: "--max-turns 24"
          prompt: |
            You are the orchestrator of an autonomous multi-agent implementation pipeline. There is no human in the loop.
            Active branch: ${{ inputs.branch }}
            Any PR you open must target ${{ inputs.branch }}, never main.
            The GitHub issue to implement is:

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}

            The standard pipeline is:
            0. YOU (orchestrator) — immediately create and check out a task branch named exactly `task/issue-${{ inputs.issue_number }}-<short-description>` off ${{ inputs.branch }}. Do this before invoking any agent. All subsequent work happens on this branch only.
            1. github-task-analyst — analyze the issue and produce a requirements brief
            2. system-architect — produce a file-level architectural plan
            3. python-code-implementer — implement the changes
            4. pytest-edge-tester — write and run tests
            5. YOU (orchestrator) — commit all changes and open a pull request targeting ${{ inputs.branch }}

            Follow this sequence by default. You may ONLY invoke these four agents: github-task-analyst, system-architect, python-code-implementer, pytest-edge-tester.
            Do NOT invoke any other agent (Explore, general-purpose, Plan, or any other) for any reason — not for codebase exploration, not in parallel, not as a shortcut.
            Agents may request re-involvement of a named pipeline agent when genuinely needed (e.g. tester finds a bug → programmer fixes it). Facilitate those. Nothing else.

            When invoking each agent, pass ONLY what is listed here — nothing more:
            - github-task-analyst: pass the issue number, title, and body only. Do NOT tell it to read source files or explore the repo.
            - system-architect: pass the analyst's requirements brief only.
            - python-code-implementer: pass the architect's file-level plan only. Before passing, remove every step that creates or modifies any file under tests/ — do not summarize, paraphrase, or delegate those steps. The implementer must receive zero test-related instructions. Tests are exclusively the pytest-edge-tester's responsibility.
            - pytest-edge-tester: pass the implementer's report (changed files and test targets) plus the test-related steps from the architect's plan that were stripped from the implementer's instructions.                                                        

            Constraints:                                                                                                                            
            - Never push directly to main
            - Follow CLAUDE.md strictly
            - Do not modify workflow or governance files unless explicitly required by the issue

            Progress logging format (mandatory):
            Write this line exactly as plain text, without markdown, bold, italics or any formatting:
            Duration: PENDING | Cost: PENDING | Turns: PENDING
            Do not estimate or guess these values — Do not modify spacing, punctuation or add any symbols.
            The workflow will replace PENDING with real values after this run completes.

      - name: Log cost and turns
        if: always()
        run: |
          EXEC_FILE="${{ steps.run-claude.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "No execution file found, skipping cost logging."
            exit 0
          fi
          RESULT=$(jq '.[] | select(.type == "result")' "$EXEC_FILE")
          COST=$(echo "$RESULT" | jq -r '.total_cost_usd // "N/A"')
          TURNS=$(echo "$RESULT" | jq -r '.num_turns // "N/A"')
          DURATION=$(echo "$RESULT" | jq -r '.duration_ms // 0')
          SUBTYPE=$(echo "$RESULT" | jq -r '.subtype // "unknown"')
          DURATION_S=$(echo "scale=1; $DURATION / 1000" | bc)
          echo "## Claude Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | $SUBTYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total cost | \$$COST USD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Turns | $TURNS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | ${DURATION_S}s |" >> "$GITHUB_STEP_SUMMARY"

      - name: Patch progress.md with actual cost
        if: always()
        run: |
          EXEC_FILE="${{ steps.run-claude.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "No execution file, skipping progress.md patch."
            exit 0
          fi
          RESULT=$(jq '.[] | select(.type == "result")' "$EXEC_FILE")
          COST=$(echo "$RESULT" | jq -r '.total_cost_usd // "N/A"')
          TURNS=$(echo "$RESULT" | jq -r '.num_turns // "N/A"')
          DURATION=$(echo "$RESULT" | jq -r '.duration_ms // 0')
          DURATION_S=$(echo "scale=1; $DURATION / 1000" | bc)
          if [ "$COST" != "N/A" ]; then
            COST_FMT=$(printf "%.6f" "$COST" 2>/dev/null || echo "$COST")
          else
            COST_FMT="$COST"
          fi

          git fetch --all --quiet
          TASK_BRANCH=$(git branch -r | grep -E "origin/task/issue-${{ inputs.issue_number }}[^0-9]" | head -1 | tr -d ' ')
          if [ -z "$TASK_BRANCH" ]; then
            TASK_BRANCH=$(git branch -r | grep "origin/task/issue-${{ inputs.issue_number }}-" | head -1 | tr -d ' ')
          fi
          if [ -z "$TASK_BRANCH" ]; then
            echo "No task branch found for issue ${{ inputs.issue_number }}, skipping."
            exit 0
          fi

          LOCAL_BRANCH="${TASK_BRANCH#origin/}"
          git checkout -b "$LOCAL_BRANCH" "$TASK_BRANCH" 2>/dev/null || git checkout "$LOCAL_BRANCH"

          if [ ! -f "progress.md" ] || ! grep -q "PENDING" progress.md; then
            echo "No PENDING placeholder in progress.md, skipping."
            exit 0
          fi

          export ACTUAL_LINE="Duration: ${DURATION_S}s | Cost: \$${COST_FMT} USD | Turns: ${TURNS}"
          python3 - <<'PYEOF'
          import os
          content = open('progress.md').read()
          actual = os.environ['ACTUAL_LINE']
          new = content.replace('Duration: PENDING | Cost: PENDING | Turns: PENDING', actual, 1)
          open('progress.md', 'w').write(new)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.md
          git commit -m "chore: update progress.md with actual workflow cost"
          git push origin "$LOCAL_BRANCH"
